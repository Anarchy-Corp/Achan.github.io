<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="أشان — صفحة البورد">
  <title>أشان | البورد</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── هيدر ── -->
  <header id="site-header">
    <div class="logo-area">
      <a href="index.html" class="site-name">「أشان」</a>
      <span class="site-slogan">تكلم بحرية — هويتك في أمان</span>
    </div>
    <nav class="header-nav">
      <a href="index.html">الرئيسية</a>
      <a href="rules.html">القوانين</a>
      <button id="dark-toggle" aria-label="تبديل الوضع الداكن">🌙 داكن</button>
    </nav>
  </header>

  <!-- ── شريط البوردات ── -->
  <nav id="board-nav" aria-label="البوردات"></nav>

  <!-- ── المحتوى ── -->
  <main class="container">

    <!-- عنوان البورد + أزرار التبديل -->
    <div class="board-header">
      <h1 id="board-title">جارٍ التحميل…</h1>
      <div class="board-view-btns">
        <a href="#" id="catalog-link">📁 الكتالوج</a>
      </div>
    </div>

    <!-- ── فورم نشر موضوع جديد ── -->
    <div class="post-form-wrapper">
      <details>
        <summary>✏️ نشر موضوع جديد</summary>

        <form id="new-thread-form" novalidate>
          <table class="form-table">
            <tr>
              <td><label for="post-name">الاسم</label></td>
              <td><input type="text" id="post-name" placeholder="مجهول" maxlength="50"></td>
            </tr>
            <tr>
              <td><label for="post-title">العنوان</label></td>
              <td><input type="text" id="post-title" placeholder="عنوان الموضوع (اختياري)" maxlength="100"></td>
            </tr>
            <tr>
              <td><label for="post-content">النص</label></td>
              <td>
                <textarea id="post-content" placeholder="اكتب هنا…&#10;&#10;ابدأ السطر بـ > للحصول على greentext&#10;اكتب >>رقم للاقتباس" maxlength="5000"></textarea>
              </td>
            </tr>
            <tr>
              <td><label for="post-image">صورة</label></td>
              <td>
                <input type="file" id="post-image" accept="image/*">
                <small style="color:var(--text-muted);font-size:0.75rem;">يُضغط تلقائياً لأقل من 500KB</small>
              </td>
            </tr>
            <tr>
              <td><label for="post-password">كلمة السر</label></td>
              <td>
                <input type="password" id="post-password" placeholder="للحذف لاحقاً (اختياري)" maxlength="50">
              </td>
            </tr>
          </table>
          <button type="submit" class="btn-submit">نشر الموضوع</button>
        </form>
      </details>
    </div>

    <!-- ── قائمة الـ Threads ── -->
    <div id="threads-container" class="threads-list">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p>جارٍ التحميل…</p>
      </div>
    </div>

  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>أشان &copy; 2024 — <a href="rules.html">القوانين</a> — <a href="index.html">الرئيسية</a></p>
  </footer>

  <!-- ── Firebase SDKs ── -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <!-- ── Scripts ── -->
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/board.js"></script>

</body>
</html>
