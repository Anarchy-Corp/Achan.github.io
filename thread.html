<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="أشان — موضوع">
  <title>أشان | موضوع</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── هيدر ── -->
  <header id="site-header">
    <div class="logo-area">
      <a href="index.html" class="site-name">「أشان」</a>
      <span class="site-slogan">تكلم بحرية — هويتك في أمان</span>
    </div>
    <nav class="header-nav">
      <a href="index.html">الرئيسية</a>
      <a href="rules.html">القوانين</a>
      <button id="dark-toggle" aria-label="تبديل الوضع الداكن">🌙 داكن</button>
    </nav>
  </header>

  <!-- ── شريط البوردات ── -->
  <nav id="board-nav" aria-label="البوردات"></nav>

  <!-- ── المحتوى ── -->
  <main class="container">

    <!-- رابط العودة -->
    <a id="board-back-link" href="board.html" class="back-link">← العودة للبورد</a>

    <!-- الموضوع الكامل -->
    <div id="thread-container">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p>جارٍ تحميل الموضوع…</p>
      </div>
    </div>

    <!-- ── فورم الرد السريع ── -->
    <div class="quick-reply-wrapper">
      <h3>💬 رد سريع</h3>
      <form id="reply-form" novalidate>
        <table class="form-table">
          <tr>
            <td><label for="reply-name">الاسم</label></td>
            <td><input type="text" id="reply-name" placeholder="مجهول" maxlength="50"></td>
          </tr>
          <tr>
            <td><label for="reply-content">الرد</label></td>
            <td>
              <textarea id="reply-content"
                placeholder="اكتب ردك هنا…&#10;&#10;ابدأ السطر بـ > للـ greentext&#10;اكتب >>رقم للاقتباس"
                maxlength="5000"
                rows="5"></textarea>
            </td>
          </tr>
          <tr>
            <td><label for="reply-image">صورة</label></td>
            <td>
              <input type="file" id="reply-image" accept="image/*">
              <small style="color:var(--text-muted);font-size:0.75rem;">يُضغط تلقائياً لأقل من 500KB</small>
            </td>
          </tr>
          <tr>
            <td><label for="reply-password">كلمة السر</label></td>
            <td>
              <input type="password" id="reply-password" placeholder="للحذف لاحقاً (اختياري)" maxlength="50">
            </td>
          </tr>
        </table>
        <button type="submit" class="btn-submit">إرسال الرد</button>
      </form>
    </div>

  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>أشان &copy; 2024 — <a href="rules.html">القوانين</a> — <a href="index.html">الرئيسية</a></p>
  </footer>

  <!-- ── Firebase SDKs ── -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <!-- ── Scripts ── -->
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/thread.js"></script>

</body>
</html>
